name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.x
          - 24.x

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate package
        run: npm pack --dry-run

      - name: Package smoke test against Homebridge 1
        run: HOMEBRIDGE_VERSION=1.11.4 npm run smoke:package

      - name: Package smoke test against Homebridge 2
        run: HOMEBRIDGE_VERSION=2.0.0 npm run smoke:package
